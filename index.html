<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>The Fifth Floor</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800;900&family=Archivo+Expanded:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root{
    --ink:#0d0d0c;
    --paper:#f3f1ea;
    --line:rgba(13,13,12,0.14);
    --line-strong:rgba(13,13,12,0.42);
    --brass:#c9a45e;
    --brass-lo:#8a6d33;
    --pad:clamp(20px,5.5vw,40px);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Archivo',sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}

  /* ============ ELEVATOR INTRO (transparent — doors reveal the page) ============ */
  #intro{position:fixed;inset:0;z-index:100;pointer-events:none;background:transparent;}
  #intro.done{display:none;}

  .door{
    position:absolute;top:0;bottom:0;width:50%;z-index:2;overflow:hidden;
    /* near-black brushed gunmetal */
    background:
      linear-gradient(100deg,
        #141414 0%,#1f1f20 22%,#2a2a2c 38%,#161617 52%,
        #232325 66%,#141414 84%,#1c1c1d 100%),
      #161616;
    transition:transform 1.15s cubic-bezier(.78,0,.22,1);
    will-change:transform;
  }
  .door.left{left:0;}
  .door.right{right:0;}

  /* tall recessed vertical panel seams on each door */
  .door .seams{position:absolute;inset:0;z-index:1;}
  .door .seams::before,.door .seams::after{
    content:"";position:absolute;top:0;bottom:0;width:2px;
    background:linear-gradient(90deg,rgba(0,0,0,0.85),rgba(255,255,255,0.07));
  }
  .door.left .seams::before{left:34%;}
  .door.left .seams::after{left:68%;}
  .door.right .seams::before{left:32%;}
  .door.right .seams::after{left:66%;}

  /* faint moving sheen for realism */
  .door::before{content:"";position:absolute;top:0;bottom:0;left:0;width:55%;z-index:2;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);}
  .door.right::before{left:auto;right:0;}

  /* bright center seam where doors meet */
  .door.left::after,.door.right::after{content:"";position:absolute;top:0;bottom:0;width:2px;z-index:4;}
  .door.left::after{right:0;background:linear-gradient(90deg,rgba(0,0,0,0.9),rgba(255,255,255,0.13));}
  .door.right::after{left:0;background:linear-gradient(90deg,rgba(255,255,255,0.13),rgba(0,0,0,0.9));}

  #intro.opening .door.left{transform:translateX(-100%);}
  #intro.opening .door.right{transform:translateX(100%);}

  /* minimal floor indicator strip mounted above the seam */
  .indic{
    position:absolute;z-index:5;top:clamp(34px,8vh,72px);left:50%;
    transform:translateX(-50%);
    display:flex;align-items:center;gap:14px;
    padding:9px 18px;
    background:#000;
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:inset 0 1px 4px rgba(0,0,0,0.9),0 6px 22px rgba(0,0,0,0.5);
    transition:transform .5s cubic-bezier(.7,0,.3,1),opacity .4s ease;
  }
  #intro.opening .indic{transform:translateX(-50%) translateY(-180%);opacity:0;}
  .indic .arr{
    font-size:11px;color:#e8e8e8;line-height:.7;
    display:flex;flex-direction:column;
  }
  .indic .arr .u{animation:arrUp 1s ease infinite;}
  .indic .arr .d{opacity:.18;}
  @keyframes arrUp{0%,100%{opacity:1;}50%{opacity:.3;}}
  .indic-num{
    font-family:'Space Mono',monospace;font-weight:700;
    font-size:clamp(22px,6vw,30px);
    color:#f0f0f0;min-width:1.3ch;text-align:center;
    text-shadow:0 0 10px rgba(255,255,255,0.25);
  }
  .indic-num.ding{animation:dingPop .4s cubic-bezier(.2,.9,.2,1);}
  @keyframes dingPop{0%{transform:scale(.92);}55%{transform:scale(1.12);}100%{transform:scale(1);}}

  /* ============ POST-LOAD CHROME ============ */
  #floorTag{
    position:fixed;top:var(--pad);right:var(--pad);z-index:40;
    font-family:'Space Mono',monospace;font-size:12px;font-weight:700;
    display:flex;align-items:center;gap:8px;
    opacity:0;transform:translateY(-6px);
    transition:opacity .6s ease .2s,transform .6s ease .2s;
    mix-blend-mode:difference;color:#fff;
  }
  #floorTag.show{opacity:1;transform:translateY(0);}
  #floorTag .dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2.4s steps(1) infinite;}
  @keyframes blink{0%,70%{opacity:1;}71%,100%{opacity:.25;}}
  #floorNum{display:inline-block;min-width:1ch;text-align:center;}

  header{
    position:fixed;top:var(--pad);left:var(--pad);z-index:40;
    mix-blend-mode:difference;color:#fff;
    opacity:0;transition:opacity .6s ease .2s;
  }
  header.show{opacity:1;}
  .wordmark{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;}

  /* ============ HERO (centered) ============ */
  .hero{
    min-height:100svh;min-height:100vh;padding:var(--pad);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;position:relative;
  }
  .hero::before{
    content:"";position:absolute;inset:0;z-index:0;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:clamp(48px,14vw,84px) clamp(48px,14vw,84px);
    -webkit-mask-image:radial-gradient(circle at center,#000 30%,transparent 78%);
            mask-image:radial-gradient(circle at center,#000 30%,transparent 78%);
    opacity:.5;
  }
  .hero-inner{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;}

  /* centered floor stack — vertical, above the title */
  .stack{display:flex;align-items:flex-end;gap:7px;margin-bottom:26px;height:42px;}
  .stack .fl{
    font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
    color:var(--line-strong);display:flex;flex-direction:column;align-items:center;gap:6px;
    opacity:0;transform:translateY(8px);
  }
  .stack .fl .bar{width:1px;background:currentColor;height:12px;transition:height .4s ease;}
  .stack .fl.on{color:var(--ink);}
  .stack .fl.on .bar{height:30px;}
  .stack .fl.reveal{animation:flIn .5s ease forwards;}
  @keyframes flIn{to{opacity:1;transform:translateY(0);}}

  .eyebrow{
    font-family:'Space Mono',monospace;font-size:11px;font-weight:700;
    letter-spacing:.34em;text-transform:uppercase;color:var(--line-strong);
    margin-bottom:20px;opacity:0;animation:rise .7s ease forwards .1s;
  }
  .title{
    font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:900;
    font-size:clamp(52px,16vw,142px);line-height:.82;letter-spacing:-.03em;text-transform:uppercase;
  }
  .title .l1,.title .l2{display:block;overflow:hidden;}
  .title .l1 span,.title .l2 span{display:block;transform:translateY(110%);}
  .title .l1 span{animation:up .8s cubic-bezier(.16,1,.3,1) forwards .15s;}
  .title .l2 span{animation:up .8s cubic-bezier(.16,1,.3,1) forwards .28s;}
  .title .l2{-webkit-text-stroke:1.4px var(--ink);color:transparent;}
  @keyframes up{to{transform:translateY(0);}}
  @keyframes rise{to{opacity:1;}}

  .slogan{
    margin-top:24px;
    font-family:'Archivo Expanded','Archivo',sans-serif;
    font-weight:800;
    font-size:clamp(20px,6vw,32px);
    letter-spacing:-.01em;
    opacity:0;animation:rise .7s ease forwards .42s;
  }
  .lede{
    margin-top:12px;max-width:34ch;font-size:clamp(15px,4.4vw,19px);
    font-weight:500;line-height:1.45;color:#1c1c1a;
    opacity:0;animation:rise .7s ease forwards .54s;
  }
  .lede b{font-weight:700;}

  .subline{
    margin-top:18px;max-width:30ch;
    font-family:'Space Mono',monospace;
    font-size:clamp(13px,3.6vw,16px);
    letter-spacing:.06em;
    line-height:1.7;
    color:#1c1c1a;
    opacity:0;animation:rise .7s ease forwards .54s;
  }
  .subline b{color:var(--ink);}
  .cta-row{
    margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:16px;
    opacity:0;animation:rise .7s ease forwards .62s;
  }
  .cta{
    -webkit-appearance:none;appearance:none;border:none;cursor:pointer;
    background:var(--ink);color:var(--paper);
    font-family:'Archivo',sans-serif;font-weight:700;font-size:16px;
    padding:18px 30px;border-radius:0;
    display:inline-flex;align-items:center;gap:14px;text-decoration:none;
    position:relative;overflow:hidden;transition:transform .25s ease;
  }
  .cta .lbl,.cta .arw{position:relative;z-index:2;}
  .cta .arw{font-family:'Space Mono',monospace;font-weight:700;transition:transform .3s ease;}
  .cta::after{content:"";position:absolute;inset:0;z-index:1;background:#2b2b28;transform:translateY(101%);transition:transform .3s ease;}
  .cta:hover::after{transform:translateY(0);}
  .cta:hover .arw{transform:translateY(-4px);}
  .cta:active{transform:scale(.98);}
  .cta:focus-visible{outline:3px solid var(--ink);outline-offset:3px;}
  .meta{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:.04em;color:var(--line-strong);line-height:1.6;}

  .hero-foot{
    position:absolute;left:var(--pad);right:var(--pad);bottom:var(--pad);z-index:2;
    padding-top:14px;border-top:1px solid var(--line);
    display:flex;justify-content:space-between;
    font-family:'Space Mono',monospace;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--line-strong);
    opacity:0;animation:rise .7s ease forwards .8s;
  }
</style>
</head>
<body>

  <!-- ELEVATOR INTRO -->
  <div id="intro">
    <div class="door left"><div class="seams"></div></div>
    <div class="door right"><div class="seams"></div></div>
    <div class="indic">
      <div class="arr"><span class="u">▲</span><span class="d">▼</span></div>
      <div class="indic-num" id="indicNum">1</div>
    </div>
  </div>

  <header id="header"><div class="wordmark">The Fifth Floor</div></header>
  <div id="floorTag"><span class="dot"></span><span>FL</span><span id="floorNum">5</span></div>

  <!-- HERO -->
  <main class="hero">
    <div class="hero-inner">
      <div class="stack" id="stack">
        <div class="fl" data-f="1"><span class="bar"></span>1</div>
        <div class="fl" data-f="2"><span class="bar"></span>2</div>
        <div class="fl" data-f="3"><span class="bar"></span>3</div>
        <div class="fl" data-f="4"><span class="bar"></span>4</div>
        <div class="fl on" data-f="5"><span class="bar"></span>5</div>
      </div>
      <div class="eyebrow">New York · Eyes on the ground</div>
      <h1 class="title">
        <span class="l1"><span>The Fifth</span></span>
        <span class="l2"><span>Floor</span></span>
      </h1>
      <p class="slogan">Don't sign blind.</p>
      <p class="subline">No commission. No agenda. Just the truth.</p>
      <div class="cta-row">
        <a class="cta" href="#book" id="bookBtn"><span class="lbl">Send someone up</span><span class="arw">↑</span></a>
        <div class="meta">Can't make the showing? We go in your place.</div>
      </div>
    </div>
    <div class="hero-foot"><span>EST. NYC</span><span>Tours · Reports · Reads</span></div>
  </main>

<script>
(function(){
  var reduce=window.matchMedia('(prefers-reduced-motion:reduce)').matches;
  var intro=document.getElementById('intro');
  var header=document.getElementById('header');
  var floorTag=document.getElementById('floorTag');
  var stack=document.getElementById('stack');
  var indicNum=document.getElementById('indicNum');

  function revealSite(){
    header.classList.add('show');
    floorTag.classList.add('show');
    stack.querySelectorAll('.fl').forEach(function(f,i){
      setTimeout(function(){f.classList.add('reveal');},110*i);
    });
  }
  function openDoors(){
    intro.classList.add('opening');
    revealSite();
    setTimeout(function(){intro.classList.add('done');},1300);
  }

  if(reduce){indicNum.textContent='5';openDoors();return;}

  var i=1;
  var tick=setInterval(function(){
    i++;
    if(i>5){
      clearInterval(tick);
      indicNum.textContent='5';
      indicNum.classList.add('ding');
      setTimeout(openDoors,460);
      return;
    }
    indicNum.textContent=i;
  },220);

  // failsafe
  setTimeout(function(){if(!intro.classList.contains('opening'))openDoors();},3000);

  var floorNum=document.getElementById('floorNum');
  window.addEventListener('scroll',function(){
    var sc=window.scrollY/Math.max(window.innerHeight*0.9,1);
    floorNum.textContent=Math.min(5+Math.floor(sc*4),12);
  },{passive:true});
})();
</script>
</body>
</html>
